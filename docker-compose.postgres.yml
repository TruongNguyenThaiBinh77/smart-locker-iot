version: '3.8'

services:
  iot-postgres:
    image: postgres:15-alpine
    container_name: iot-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iot_locker
    ports:
      - "5432:5432"
    volumes:
      - iot_postgres_data:/var/lib/postgresql/data

volumes:
  iot_postgres_data:
